services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    environment:
      - PORT=3000
      - UPLOAD_PATH=./uploads

  lint:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    command: npm run lint
    profiles:
      - ci
    volumes:
      - .:/app
      - /app/node_modules

  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    command: npm test
    profiles:
      - ci
    volumes:
      - .:/app
      - /app/node_modules
